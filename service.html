<script>
var DATA={
  cut:{t:"Hair Cut",jp:"カット",img:"https://static.wixstatic.com/media/25eaf5_33f880b9278b401094ad29804504069f~mv2.jpg",price:"from ฿1,000",time:"約45〜60分",
    desc:"骨格・髪質・毛流れを丁寧に見極め、乾かすだけで決まる「再現性の高い」デザインカット。日々のスタイリングが驚くほど楽になります。",
    p:[["Counseling","なりたい印象と髪の悩みを、母国語でしっかり共有。"],["Dry cut balance","乾いた状態で微調整し、左右差や生えぐせを補正。"],["Easy styling","家でも再現しやすい、計算されたフォルム設計。"]]},
  colour:{t:"Design Colour",jp:"デザインカラー",img:"https://static.wixstatic.com/media/25eaf5_f38fe17bf8484af68d09adc1893bfc1f~mv2.jpg",price:"from ฿2,500",time:"約120〜180分",
    desc:"バンコクNo.1の日本人カラーリストによる、ハイトーン・ハイライト・バレイヤージュ。透明感と立体感を両立した、あなただけの色設計。",
    p:[["High-tone","くすみのない、抜け感のあるハイトーン表現。"],["Foil work","欧米毛にも対応する繊細なフォイルワーク。"],["Care colour","日本の薬剤で、髪へのダメージに配慮。"]]},
  perm:{t:"Straight Perm",jp:"縮毛矯正",img:"",price:"from ฿3,990",time:"約180分",
    desc:"不自然な「ペタッと」ではなく、自然なまっすぐへ。日本の薬剤と技術で、扱いやすく艶やかな髪に整えます。",
    p:[["Natural finish","内側からまとまる、自然なストレート。"],["Humidity proof","湿気の多いバンコクでも広がりにくい。"],["Gentle","髪質に合わせた薬剤選定でやさしく。"]]},
  keratin:{t:"Kerasilk Keratin",jp:"ケラチントリートメント",img:"https://static.wixstatic.com/media/25eaf5_b210d49477e24921b061f818493d257f~mv2.jpg",price:"from ฿3,990",time:"約120分",
    desc:"Kerasilk による上質な質感補修。広がりやうねりを抑え、しっとりまとまる髪へ。ツヤと指通りが続きます。",
    p:[["Smooth","うねり・広がりをコントロール。"],["Shine","内側から潤う、上質なツヤ感。"],["Lasting","効果が長く続くプレミアム処方。"]]},
  headspa:{t:"Japanese Head Spa",jp:"ジャパニーズヘッドスパ",img:"1540555700478-4be289fbecef",price:"from ฿1,200",time:"約45分",
    desc:"バンコク・スクンビット／プロンポンの高級ジャパニーズヘッドスパ。頭皮ケア・深いリラックス・なめらかで健やかな髪へと導く、Ciel独自の技術。",
    p:[["Head bath","毛穴の汚れをすっきり洗い流す。"],["Scalp massage","凝りをほぐす本格頭皮マッサージ。"],["Deep relaxation","心までほどける極上のリラックス。"]],
    feature:{kick:"Ciel's Signature Techniques",t:"TOKIO Premium Treatment",img:"1599351431202-1e0f0137899a",
      body:"TOKIO 4ステップは、INKARAMI（インカラミ）技術で髪を内側から補修する日本のプレミアムトリートメント。ダメージ毛を強く、なめらかにし、重さを残さず自然なツヤを取り戻します。<br><br>カラー・ブリーチ・乾燥が気になる髪に最適。Ciel独自の仕上げで、長持ちするシルクのような手触りに。"}}
};
var ORDER=["cut","colour","perm","keratin"];
function load(){
  var id=(location.hash||"#cut").replace("#","");
  if(id==="headspa"){location.href="headspa.html";return;}
  if(!DATA[id]) id="cut";
  var d=DATA[id];
  if(d.img){var imgUrl=d.img.indexOf('http')===0?d.img:'https://images.unsplash.com/photo-'+d.img+'?auto=format&fit=crop&w=1600&q=80';
    document.getElementById('phero').style.backgroundImage="linear-gradient(rgba(0,0,0,.3),rgba(0,0,0,.5)), url('"+imgUrl+"')";
  }else{document.getElementById('phero').style.backgroundImage="none";}
  document.getElementById('title').textContent=d.t;
  document.getElementById('sub').textContent=d.jp;
  document.getElementById('m-price').textContent=d.price;
  document.getElementById('m-time').textContent=d.time;
  document.getElementById('desc').textContent=d.desc;
  document.getElementById('pricenote').style.display=(id==='cut')?'none':'block';
  for(var i=0;i<3;i++){document.getElementById('p'+(i+1)+'t').textContent=d.p[i][0];document.getElementById('p'+(i+1)+'d').textContent=d.p[i][1];}
  var f=document.getElementById('feature');
  if(d.feature){f.style.display='grid';
    document.getElementById('f-img').style.backgroundImage="url('https://images.unsplash.com/photo-"+d.feature.img+"?auto=format&fit=crop&w=900&q=80')";
    document.getElementById('f-kick').textContent=d.feature.kick;
    document.getElementById('f-title').textContent=d.feature.t;
    document.getElementById('f-body').innerHTML=d.feature.body;
  }else{f.style.display='none';}
  var chips=ORDER.map(function(k){return '<a class="chip'+(k===id?' on':'')+'" href="#'+k+'">'+DATA[k].t+'</a>';}).join('');
  document.getElementById('chips').innerHTML=chips;
  document.title=d.t+" | Ciel";
}
load();
addEventListener('hashchange',function(){load();location.reload();});
</script>
